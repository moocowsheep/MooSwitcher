# MooSwitcher network tuning (remote NDI / SRT at high bitrates).
# Install: sudo cp scripts/tuning-sysctl.conf /etc/sysctl.d/90-mooswitcher.conf
#          sudo sysctl --system
#
# 8K NDI is 1-2.5 Gbps of UDP/TCP; SRT at 200 Mbps with 120 ms latency wants
# deep send buffers. Default rmem_max/wmem_max (4 MB here) drop bursts.

net.core.rmem_max = 67108864
net.core.wmem_max = 67108864
net.core.rmem_default = 8388608
net.core.wmem_default = 8388608
net.core.netdev_max_backlog = 5000
